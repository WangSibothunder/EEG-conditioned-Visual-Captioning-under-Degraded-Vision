experiment_id: trimodal_eeg_imagenet_exact_full_cacheonly
seed: 42
device: auto
data:
  train_manifest: data/EEG-ImageNet/train_human_caption.jsonl
  val_manifest: data/EEG-ImageNet/val_human_caption.jsonl
  test_manifest: data/EEG-ImageNet/test_human_caption.jsonl
  root: data/EEG-ImageNet
  clip_train_cache: data/EEG-ImageNet/cache/clip_train_image_exact.npy
  clip_val_cache: data/EEG-ImageNet/cache/clip_val_image_exact.npy
  clip_index_train: data/EEG-ImageNet/cache/clip_index_train_image_exact.json
  clip_index_val: data/EEG-ImageNet/cache/clip_index_val_image_exact.json
  text_cache: data/EEG-ImageNet/cache/text_embeddings_exact.npy
  text_index: data/EEG-ImageNet/cache/text_index_exact.json
  text_source: human
  eeg_train_cache: data/EEG-ImageNet/cache/eeg_train_image_exact.npy
  eeg_val_cache: data/EEG-ImageNet/cache/eeg_val_image_exact.npy
model:
  eeg_channels: 62
  eeg_time_steps: 501
  hidden_dim: 512
  transformer_layers: 8
  dropout: 0.15
  eeg_embed_dim: 512
  clip_embed_dim: 512
  encoder_type: masked_pretrained
  pretrained_eeg_checkpoint: outputs/pretrain/masked_eeg_eeg_imagenet_dualbranch_heavy/checkpoints/best_masked_eeg.pt
  pretrained_key: model
  pretrained_strict: false
loss:
  temperature: 0.07
  lambda_image: 1.0
  lambda_text: 1.0
  lambda_cls: 0.3
  lambda_proto: 0.2
  use_multi_positive: true
  loss_combo: EEG-image + EEG-text + class CE + prototype
train:
  batch_size: 128
  grad_accum_steps: 2
  epochs: 100
  lr: 5.0e-05
  weight_decay: 0.05
  bf16: true
  num_workers: 0
  log_every: 10
  patience: 15
  max_train_samples: 0
  max_val_samples: 0
output:
  dir: outputs/trimodal/eeg_imagenet_exact_full
notes: Full tri-modal EEG-image-text contrastive training on the exact-linked EEG-ImageNet
  subset only. This uses synchronized JPEG-derived CLIP image embeddings and caption-derived
  CLIP text embeddings; missing exact stimulus images are excluded.
