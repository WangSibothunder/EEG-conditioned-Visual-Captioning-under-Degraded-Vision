experiment_id: trimodal_eeg_imagenet_exact_a2_scratch_full
seed: 6262
device: auto
data:
  train_manifest: data/EEG-ImageNet/train_human_caption.jsonl
  val_manifest: data/EEG-ImageNet/val_human_caption.jsonl
  test_manifest: data/EEG-ImageNet/test_human_caption.jsonl
  root: data/EEG-ImageNet
  clip_train_cache: data/EEG-ImageNet/cache/clip_train_image_exact.npy
  clip_val_cache: data/EEG-ImageNet/cache/clip_val_image_exact.npy
  clip_index_train: data/EEG-ImageNet/cache/clip_index_train_image_exact.json
  clip_index_val: data/EEG-ImageNet/cache/clip_index_val_image_exact.json
  text_cache: data/EEG-ImageNet/cache/text_embeddings_exact.npy
  text_index: data/EEG-ImageNet/cache/text_index_exact.json
  text_source: human
  eeg_train_cache: data/EEG-ImageNet/cache/eeg_train_image_exact.npy
  eeg_val_cache: data/EEG-ImageNet/cache/eeg_val_image_exact.npy
model:
  eeg_channels: 62
  eeg_time_steps: 501
  hidden_dim: 384
  transformer_layers: 6
  dropout: 0.30
  eeg_embed_dim: 512
  clip_embed_dim: 512
  encoder_type: temporal_spectral_spatial_transformer
loss:
  temperature: 0.07
  lambda_image: 1.0
  lambda_text: 1.0
  lambda_cls: 0.4
  lambda_proto: 0.3
  use_multi_positive: true
  loss_combo: EEG-image + EEG-text + stronger class CE + prototype
train:
  batch_size: 512
  grad_accum_steps: 1
  epochs: 120
  lr: 0.0001
  weight_decay: 0.05
  bf16: true
  num_workers: 0
  log_every: 20
  patience: 18
  max_train_samples: 0
  max_val_samples: 0
output:
  dir: outputs/trimodal/eeg_imagenet_exact_a2_scratch_full
notes: Strong A2-style tri-modal EEG-image-text training on the EEG-ImageNet exact-linked subset from scratch. Queued after earlier masked-pretrained exact-linked tri-modal result was near random.
