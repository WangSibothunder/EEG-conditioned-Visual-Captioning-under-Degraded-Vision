experiment_id: eeg_imagenet_pretrain_t2t_align_recovery
seed: 42
device: auto
data:
  train_manifest: data/thought2text/train.jsonl
  val_manifest: data/thought2text/val.jsonl
  test_manifest: data/thought2text/test.jsonl
  root: data/thought2text
  clip_train_cache: data/thought2text/cache/clip_train.npy
  clip_val_cache: data/thought2text/cache/clip_val.npy
  clip_test_cache: data/thought2text/cache/clip_test.npy
  clip_index_train: data/thought2text/cache/clip_index_train.json
  clip_index_val: data/thought2text/cache/clip_index_val.json
  clip_index_test: data/thought2text/cache/clip_index_test.json
  eeg_train_cache: data/thought2text/cache/eeg_pretrain_train.npy
  eeg_val_cache: data/thought2text/cache/eeg_pretrain_val.npy
model:
  eeg_channels: 64
  eeg_time_steps: 250
  hidden_dim: 512
  transformer_layers: 8
  dropout: 0.15
  eeg_embed_dim: 512
  clip_embed_dim: 512
  encoder_type: masked_pretrained
  pretrained_eeg_checkpoint: outputs/pretrain/masked_eeg_eeg_imagenet_dualbranch_heavy/checkpoints/best_masked_eeg.pt
  pretrained_key: model
  pretrained_strict: false
  pretrained_allow_shape_mismatch: true
loss:
  use_infonce: true
  use_multi_positive_infonce: true
  use_cosine: true
  use_mse: false
  use_class_ce: true
  use_cls: true
  use_supcon: false
  use_prototype_alignment: true
  use_similarity_distillation: true
  use_similarity_distill: true
  use_aug_consistency: false
  use_same_image_subject: false
  use_hard_negative: false
  temperature: 0.07
  tau_sim: 0.1
  lambda_infonce: 1.0
  lambda_multi_positive: 0.5
  lambda_cosine: 0.5
  lambda_mse: 0.5
  lambda_class_ce: 0.3
  lambda_cls: 0.3
  lambda_supcon: 0.2
  lambda_proto: 0.2
  lambda_similarity: 0.2
  lambda_sim: 0.2
  lambda_aug: 0.1
  lambda_same_image_subject: 0.2
  lambda_hard_negative: 0.05
  loss_combo: L1+L2+L4+L5
train:
  batch_size: 128
  grad_accum_steps: 2
  epochs: 80
  lr: 0.00005
  weight_decay: 0.05
  bf16: true
  num_workers: 0
  log_every: 10
  patience: 12
  max_train_samples: 0
  max_val_samples: 0
  resume_checkpoint: outputs/transfer/eeg_imagenet_pretrain_t2t_align/checkpoints/last.pt
output:
  dir: outputs/transfer/eeg_imagenet_pretrain_t2t_align
notes: Recovery config for Thought2Text transfer from EEG-ImageNet masked EEG pretraining
  after the original process was killed under high host-memory pressure. Resumes from
  last.pt with lower per-step batch size and equivalent effective batch via grad accumulation.
