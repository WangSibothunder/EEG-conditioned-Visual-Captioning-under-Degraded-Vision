seed: 42
device: auto
output_dir: outputs

data:
  root: data
  train_manifest: train.jsonl
  val_manifest: val.jsonl
  image_size: 224
  eeg_channels: 64
  eeg_timesteps: 250
  eeg_target_channels: 64
  eeg_target_timesteps: 250

model:
  vision_model: openai/clip-vit-base-patch32
  llm_model: Qwen/Qwen2.5-1.5B-Instruct
  use_tiny_debug_model: true
  image_dim: 512
  eeg_dim: 512
  prompt_tokens: 8
  max_text_length: 64

train:
  batch_size: 2
  grad_accum_steps: 2
  epochs: 1
  lr: 0.001
  weight_decay: 0.01
  max_steps: 4
  log_every: 1
  save_every_epoch: true
  amp: true

generation:
  max_new_tokens: 24
  num_samples: 4
