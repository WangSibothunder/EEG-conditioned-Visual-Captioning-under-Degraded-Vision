    notes: "Full EEG-ImageNet EEG-only masked pretraining completed. Best checkpoint is outputs/pretrain/masked_eeg_eeg_imagenet_dualbranch_heavy/checkpoints/best_masked_eeg.pt; image files were not needed for this pretext task."
