# Heavy-stage queue for scripts/heavy_stage_scheduler.py.
# Default mode records status and recommendations only.
# Use `python scripts/heavy_stage_scheduler.py --launch-when-idle` to launch the
# next queued command only when the recent GPU idle diagnosis triggers.
jobs:
  - id: DATASET_THINGS_EEG2_READY
    priority: 10
    status: blocked
    command: "python scripts/build_things_eeg2_manifest.py --root /cloud/cloud-ssd1/eeg_vision_caption_data/THINGS-EEG2"
    expected_output: "outputs/datasets/THINGS_EEG2_READY_REPORT.md"
    notes: "THINGS-EEG2 raw repo is verified and image_set is extracted, but no trial/event stimulus-order metadata was found. It is still blocked for image+EEG trial-level manifests. Raw continuous EEG is being used separately for masked EEG pretraining via fixed windows."
  - id: DATASET_EIT1M_READY
    priority: 20
    status: blocked
    command: "python scripts/build_eit1m_manifest.py --root /cloud/cloud-ssd1/eeg_vision_caption_data/EIT-1M"
    expected_output: "outputs/datasets/EIT1M_READY_REPORT.md"
    notes: "Public HF release is partial and only useful for pilot/metadata smoke, not full tri-modal training."
  - id: DATASET_EEG_IMAGENET_READY
    priority: 25
    status: completed
    command: "python scripts/build_eeg_imagenet_manifest.py --root /cloud/cloud-ssd1/eeg_vision_caption_data/EEG-ImageNet/extracted --out data/EEG-ImageNet/small_manifest.jsonl --report outputs/datasets/EEG_IMAGENET_READY_REPORT.md"
    expected_output: "outputs/datasets/EEG_IMAGENET_READY_REPORT.md"
    notes: "EEG-ImageNet extraction and JSONL conversion are complete. Full EEG-only train/val/test manifests exist and are valid for EEG-only pretraining. ImageNet CLS-LOC is downloaded/extracted; paired image+EEG training uses only exact-linked subset manifests because some exact stimulus JPEGs are absent from Kaggle CLS-LOC."
  - id: DATASET_EEG_IMAGENET_IMAGE_LINK
    priority: 26
    status: partial_ready
    command: "python scripts/watch_and_link_eeg_imagenet_images.py --run --poll-seconds 30 --max-wait-seconds -1"
    expected_output: "data/EEG-ImageNet/train_image_exact.jsonl"
    notes: "Watcher should run in tmux session eeg_imagenet_image_link. It waits for ImageNet Kaggle CLS-LOC zip completion, validation, outer extraction marker, nested extraction marker, and JPEG availability, then links train/val/test EEG-ImageNet manifests to real image paths. Because Kaggle CLS-LOC lacks some exact original EEG-ImageNet stimuli, paired training uses only exact-linked subset manifests and never same-class replacement images."
  - id: MASKED_EEG_PRETRAIN_HEAVY
    priority: 30
    status: completed
    command: "bash scripts/run_masked_eeg_pretrain.sh"
    expected_output: "outputs/pretrain/MASKED_EEG_PRETRAIN_REPORT.md"
    notes: "Running on Thought2Text fallback while larger datasets are not loader-ready."
  - id: TRIMODAL_CONTRASTIVE_FULL
    priority: 40
    status: completed
    command: "bash scripts/run_trimodal_align.sh configs/trimodal/full_masked_pretrained.yaml outputs/trimodal/full_masked_pretrained"
    expected_output: "outputs/trimodal/TRIMODAL_FULL_REPORT.md"
    notes: "Full Thought2Text tri-modal job resumed from last.pt with num_workers=0 after cgroup kill from per-worker .pth cache duplication; not smoke."
  - id: TRANSFER_THOUGHT2TEXT
    priority: 50
    status: completed
    command: "bash scripts/run_masked_pretrain_transfer.sh"
    expected_output: "outputs/transfer/masked_pretrain_t2t_align/checkpoints/best.pt"
    notes: "Transfer masked-pretrained encoder resumed from last.pt with num_workers=0 and EEG memmap cache; compare against Day4/Day5 baselines."
  - id: CLIP_ADAPTER_THOUGHT2TEXT
    priority: 60
    status: completed
    command: "bash scripts/run_clip_adapter.sh configs/clip_adapter/thought2text_adapter.yaml outputs/clip_adapter/thought2text_adapter"
    expected_output: "outputs/clip_adapter/CLIP_ADAPTER_REPORT.md"
    notes: "Neural-aware CLIP adapter/cached-embedding calibration job; launch after implementation smoke passes or if GPU has safe spare memory."
  - id: TRANSFER_EEG_IMAGENET_PRETRAIN_TO_THOUGHT2TEXT
    priority: 70
    status: completed
    command: "bash scripts/run_align.sh --config configs/recovery/eeg_imagenet_pretrain_t2t_align_recovery.yaml --output_dir outputs/transfer/eeg_imagenet_pretrain_t2t_align --max_train_samples 0 --max_val_samples 0"
    expected_output: "outputs/transfer/eeg_imagenet_pretrain_t2t_align/checkpoints/best.pt"
    notes: "Original process was killed at epoch 23 under high host-memory pressure while many DataLoader workers from concurrent jobs were active. A num_workers=0 recovery also was killed around epoch 27 while worker-heavy stage2 jobs were still active. Host RAM later recovered after multiple stage2 jobs completed; recovery is being restarted from last.pt with num_workers=0."
  - id: ROBUST_SEMANTIC_EVAL_AFTER_EEG_IMAGENET_TRANSFER
    priority: 80
    status: completed
    command: "python scripts/launch_semantic_eval_after_transfer.py --background"
