experiment_id: E4_G2_heavy_seed2718
seed: 2718
device: auto
data:
  train_manifest: data/thought2text/train.jsonl
  val_manifest: data/thought2text/val.jsonl
  test_manifest: data/thought2text/test.jsonl
  root: data/thought2text
  clip_train_cache: data/thought2text/cache/clip_train.npy
  clip_val_cache: data/thought2text/cache/clip_val.npy
  clip_test_cache: data/thought2text/cache/clip_test.npy
  clip_index_train: data/thought2text/cache/clip_index_train.json
  clip_index_val: data/thought2text/cache/clip_index_val.json
  clip_index_test: data/thought2text/cache/clip_index_test.json
model:
  eeg_channels: 64
  eeg_time_steps: 250
  eeg_embed_dim: 512
  clip_embed_dim: 512
  encoder_type: convtransformer_strong
  dropout: 0.35
loss:
  use_infonce: true
  use_multi_positive_infonce: true
  use_cosine: true
  use_mse: false
  use_class_ce: true
  use_cls: true
  use_supcon: false
  use_prototype_alignment: true
  use_similarity_distillation: true
  use_similarity_distill: true
  use_aug_consistency: true
  use_same_image_subject: false
  use_hard_negative: false
  temperature: 0.07
  tau_sim: 0.1
  lambda_infonce: 1.0
  lambda_multi_positive: 0.5
  lambda_cosine: 0.5
  lambda_class_ce: 0.3
  lambda_cls: 0.3
  lambda_proto: 0.2
  lambda_similarity: 0.2
  lambda_sim: 0.2
  lambda_aug: 0.1
  loss_combo: L1+L2+L4+L5+L6
train:
  batch_size: 128
  grad_accum_steps: 1
  epochs: 25
  lr: 3.0e-05
  weight_decay: 0.05
  bf16: true
  num_workers: 2
  log_every: 10
  patience: 6
  max_train_samples: 0
  max_val_samples: 0
output:
  dir: outputs/day5_heavy_alignment/E4_G2_heavy_seed2718
notes: Day5 heavy E4 strong encoder with similarity distillation and augmentation on full Thought2Text split.
