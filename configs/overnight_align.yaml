seed: 42
device: auto

data:
  train_manifest: data/thought2text/train.jsonl
  val_manifest: data/thought2text/val.jsonl
  test_manifest: data/thought2text/test.jsonl
  root: data/thought2text
  clip_train_cache: data/thought2text/cache/clip_train.npy
  clip_val_cache: data/thought2text/cache/clip_val.npy
  clip_test_cache: data/thought2text/cache/clip_test.npy
  clip_index_train: data/thought2text/cache/clip_index_train.json
  clip_index_val: data/thought2text/cache/clip_index_val.json
  clip_index_test: data/thought2text/cache/clip_index_test.json

model:
  eeg_embed_dim: 512
  clip_embed_dim: 512
  eeg_channels: 64
  eeg_time_steps: 250
  hidden_dim: 128
  transformer_layers: 2
  dropout: 0.1

loss:
  use_infonce: true
  use_mse: true
  use_cls: true
  use_similarity_distill: true
  use_aug_consistency: true
  temperature: 0.07
  tau_sim: 0.1
  lambda_mse: 0.5
  lambda_cls: 0.2
  lambda_sim: 0.2
  lambda_aug: 0.1

train:
  batch_size: 128
  grad_accum_steps: 1
  epochs: 80
  lr: 0.0001
  weight_decay: 0.01
  bf16: true
  num_workers: 4
  log_every: 20
  eval_every_epoch: true
  patience: 12
  save_best_by: val_recall_at_5

output:
  dir: outputs/overnight/align_strong
