experiment_id: thought2text_clip_adapter
seed: 42
device: auto
data:
  train_manifest: data/thought2text/train.jsonl
  val_manifest: data/thought2text/val.jsonl
  clip_train_cache: data/thought2text/cache/clip_train.npy
  clip_val_cache: data/thought2text/cache/clip_val.npy
  clip_index_train: data/thought2text/cache/clip_index_train.json
  clip_index_val: data/thought2text/cache/clip_index_val.json
  eeg_train_cache: data/thought2text/cache/eeg_pretrain_train.npy
  eeg_val_cache: data/thought2text/cache/eeg_pretrain_val.npy
model:
  eeg_channels: 64
  eeg_time_steps: 250
  eeg_embed_dim: 512
  clip_dim: 512
  hidden_dim: 128
  adapter_hidden_dim: 1024
  transformer_layers: 2
  dropout: 0.1
  encoder_type: tiny
loss:
  temperature: 0.07
  lambda_mse: 0.5
  lambda_eeg_mse: 0.5
  lambda_cosine: 0.5
  lambda_cls: 1.0
  lambda_eeg_cls: 0.3
train:
  epochs: 40
  batch_size: 128
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.01
  bf16: true
  log_every: 20
  max_train_samples: 0
  max_val_samples: 0
output:
  dir: outputs/clip_adapter/thought2text_adapter
notes: "Heavy-stage Job 4: cached-embedding Neural-Aware CLIP Adapter baseline. Does not load raw CLIP or images."
